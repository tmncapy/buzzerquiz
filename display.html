<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình Trình Chiếu</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a252f; color: white; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .main-panel, .side-panel { background: #2c3e50; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1, h2 { margin-top: 0; text-align: center; color: #ecf0f1; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #34495e; padding: 15px; border-radius: 8px; text-align: center; border-bottom: 4px solid #2ecc71; }
        .stat-box.live { border-bottom-color: #27ae60; }
        .stat-box.dead { border-bottom-color: #e74c3c; }
        .stat-num { font-size: 32px; font-weight: bold; display: block; margin-top: 5px; }
        .question-area { background: #34495e; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-size: 24px; font-weight: bold; min-height: 80px; }
        .reveal-banner { display: none; background: #27ae60; font-size: 26px; font-weight: bold; text-align: center; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #fff; }
        .players-list { display: flex; flex-direction: column; gap: 10px; }
        .p-row { display: flex; justify-content: space-between; align-items: center; background: #34495e; padding: 12px 20px; border-radius: 6px; font-size: 18px; font-weight: 500; border-left: 5px solid #7f8c8d; transition: 0.2s; }
        .p-ans-badge { font-weight: bold; padding: 5px 12px; border-radius: 4px; color: white; min-width: 70px; text-align: center; }
        .state-eliminated { opacity: 0.4; background: #23313f !important; border-left-color: #c0392b !important; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #34495e; }
    </style>
</head>
<body>
    <h1 style="font-size: 32px; color:#2ecc71;">MÀN HÌNH TỔNG QUAN GAME TRÌNH CHIẾU</h1>
    <div class="container">
        <div class="main-panel">
            <div class="question-area" id="view-question">🎯 Đang đợi Admin phát đề bài câu hỏi mới...</div>
            <div class="reveal-banner" id="view-answer-banner">🎉 ĐÁP ÁN ĐÚNG LÀ: </div>
            
            <h2>DANH SÁCH THÍ SINH TRANH TÀI</h2>
            <div class="players-list" id="view-players-list"></div>
        </div>

        <div class="side-panel">
            <h2>THỐNG KÊ SÀN ĐẤU</h2>
            <div class="stats-grid">
                <div class="stat-box">Tổng số<span class="stat-num" id="view-total">0</span></div>
                <div class="stat-box live">Còn lại<span class="stat-num" id="view-live" style="color:#2ecc71">0</span></div>
                <div class="stat-box dead">Bị loại<span class="stat-num" id="view-dead" style="color:#e74c3c">0</span></div>
            </div>

            <h3 style="color:#f1c40f; border-bottom:1px solid #fff; padding-bottom:5px;">🏆 BẢNG XẾP HẠNG ĐIỂM SỐ</h3>
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let dPlayersMap = {};
        let currentMode = 'MCQ';
        let isRevealed = false;
        let globalCorrectAns = '';

        socket.on('START_QUIZ', (data) => {
            currentMode = data.mode;
            isRevealed = false; 
            globalCorrectAns = '';
            document.getElementById('view-question').innerText = `❓ CÂU HỎI: ${data.question}`;
            document.getElementById('view-answer-banner').style.display = 'none';
            renderDisplayUI();
        });

        socket.on('SYNC_DATA_FROM_SERVER', (data) => {
            dPlayersMap = data.players;
            isRevealed = data.isRevealed;
            globalCorrectAns = data.correctAns;
            if (isRevealed) {
                document.getElementById('view-answer-banner').innerText = `🎉 ĐÁP ÁN ĐÚNG LÀ: ${globalCorrectAns}`;
                document.getElementById('view-answer-banner').style.display = 'block';
            }
            renderDisplayUI();
            renderLeaderboard();
        });

        socket.on('COMMAND_DISPLAY_REVEAL', (data) => {
            isRevealed = true;
            globalCorrectAns = data.correctAns;
            dPlayersMap = data.players; 
            
            const banner = document.getElementById('view-answer-banner');
            banner.innerText = `🎉 ĐÁP ÁN CHÍNH XÁC LÀ: ${globalCorrectAns.toUpperCase()}`;
            banner.style.display = 'block';
            
            renderDisplayUI(); 
            renderLeaderboard();
        });

        function renderDisplayUI() {
            const listContainer = document.getElementById('view-players-list');
            listContainer.innerHTML = '';
            let total = 0; let live = 0; let dead = 0;

            for(let name in dPlayersMap) {
                total++;
                const p = dPlayersMap[name];
                if (p.isEliminated) { dead++; } else { live++; }

                const row = document.createElement('div');
                row.className = `p-row ${p.isEliminated ? 'state-eliminated' : ''}`;
                
                let ansBadge = '';
                if (!p.isEliminated) {
                    if (p.answer === 'Chưa trả lời') {
                        ansBadge = `<span class="p-ans-badge" style="background:#7f8c8d">...</span>`;
                    } else {
                        if (!isRevealed) {
                            ansBadge = `<span class="p-ans-badge" style="background:${p.isLocked ? '#2ecc71':'#f39c12'}">
                                ${p.isLocked ? "🔒 Chốt" : "✍️ Sửa"}
                            </span>`;
                        } else {
                            let isCorrect = false;
                            if (currentMode === 'MCQ') {
                                isCorrect = (p.answer === globalCorrectAns);
                            } else {
                                isCorrect = (p.answer.toLowerCase().trim() === globalCorrectAns.toLowerCase().trim());
                            }
                            row.style.backgroundColor = isCorrect ? "#27ae60" : "#c0392b";
                            ansBadge = `<span class="p-ans-badge" style="background:rgba(255,255,255,0.2)">${p.answer}</span>`;
                        }
                    }
                } else {
                    ansBadge = `<span class="p-ans-badge" style="background:#e74c3c">LOẠI</span>`;
                }

                row.innerHTML = `<div>👤 ${name}</div>${ansBadge}`;
                listContainer.appendChild(row);
            }
            document.getElementById('view-total').innerText = total;
            document.getElementById('view-live').innerText = live;
            document.getElementById('view-dead').innerText = dead;
        }

        function renderLeaderboard() {
            const lbContainer = document.getElementById('leaderboard-list');
            lbContainer.innerHTML = '';
            let list = [];
            for (let name in dPlayersMap) { list.push({ name: name, ...dPlayersMap[name] }); }
            
            // Sắp xếp theo tổng điểm cao nhất, điểm bằng nhau xếp theo thời gian phản hồi thấp nhất
            list.sort((a, b) => parseFloat(b.totalScore || 0) - parseFloat(a.totalScore || 0));

            list.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = 'rank-item';
                if(p.isEliminated) item.style.opacity = '0.4';
                item.innerHTML = `<span><b>#${index+1}</b> ${p.name}</span> <span><b>${p.totalScore || 0}đ</b></span>`;
                lbContainer.appendChild(item);
            });
        }
    </script>
</body>
</html>
