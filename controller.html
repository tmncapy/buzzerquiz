<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản điều khiển - Controller Admin</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        button { background: #27ae60; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; }
        button:hover { background: #219653; }
        button:disabled { background: #ccc !important; cursor: not-allowed !important; opacity: 0.6 !important; }
        input, select { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; width: 100%; }
        .quiz-setup { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .quiz-setup label { font-weight: bold; display: block; margin-top: 8px; color: #555; }
        .inline-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .timer-banner { font-size: 24px; font-weight: bold; color: #e74c3c; margin: 15px 0; }
        .btn-grade-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; margin-bottom: 15px; }
        .btn-g { font-weight: bold; font-size: 18px; padding: 12px; border-radius: 6px; border: none; color: white; cursor: pointer; }
        .bg-A { background: #e74c3c; } .bg-B { background: #3498db; } .bg-C { background: #4b0082; } .bg-D { background: #f1c40f; }
        .player-list { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .player-item.eliminated-row { opacity: 0.5; background: #fce4e4; }
        .player-info { display: flex; flex-direction: column; }
        .player-name-text { font-weight: bold; font-size: 16px; }
        .time-elapsed { font-size: 12px; color: #2980b9; font-weight: bold; }
        .action-btns { display: flex; gap: 10px; align-items: center; }
        .btn-kick { background: #e74c3c; padding: 5px 10px; font-size: 12px; border-radius: 4px; border: none; color: white; cursor: pointer; }
        .btn-revive { background: #2ecc71; padding: 5px 10px; font-size: 12px; border-radius: 4px; border: none; color: white; cursor: pointer; }
        .badge { background: #7f8c8d; color: white; padding: 5px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; min-width: 90px; text-align: center; }
        .status-badge { font-size: 11px; padding: 2px 4px; border-radius: 4px; font-weight: bold; margin-left: 5px;}
        .status-lock { background: #27ae60; color: white; }
        .status-typing { background: #f39c12; color: white; }
        .input-score-edit { width: 70px; padding: 4px; text-align: center; font-size: 14px; font-weight: bold; margin-left: 5px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>BẢNG ĐIỀU KHIỂN QUẢN TRỊ (ADMIN ONLINE)</h2>
        <div class="quiz-setup">
            <label>Loại câu hỏi:</label>
            <select id="input-quiz-type">
                <option value="MCQ">Trắc nghiệm (A, B, C, D)</option>
                <option value="SHORT_ANS">Trả lời ngắn (Tự luận)</option>
            </select>
            
            <label>Nội dung câu hỏi:</label>
            <input type="text" id="input-question" value="Quan sát câu hỏi trên màn hình máy chiếu...">
            
            <div class="inline-group">
                <div><label>Thời gian (giây):</label><input type="number" id="input-timer" value="15" min="5" style="width: 100px;"></div>
                <div style="flex-grow: 1;"><label>Điểm tối đa câu này:</label><input type="number" id="input-question-score" value="100" style="width: 100px;"></div>
            </div>
        </div>

        <button id="btn-start-quiz" onclick="startQuiz()">▶ PHÁT ĐỀ & TÍNH GIỜ</button>
        <div class="timer-banner" id="control-timer">Thời gian câu hỏi: --</div>

        <div style="background: #e8f4f8; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px dashed #2980b9; text-align: left;">
            <b style="color: #2980b9;">BƯỚC 1: CHỌN ĐÁP ÁN ĐÚNG (NẾU CHƠI TRẮC NGHIỆM):</b>
            <div class="btn-grade-group">
                <button class="btn-g bg-A" onclick="selectMcqAnswer('A')">A</button>
                <button class="btn-g bg-B" onclick="selectMcqAnswer('B')">B</button>
                <button class="btn-g bg-C" onclick="selectMcqAnswer('C')">C</button>
                <button class="btn-g bg-D" onclick="selectMcqAnswer('D')">D</button>
            </div>
            
            <b style="color: #2980b9; display:block; margin-top:10px;">HOẶC NHẬP ĐÁP ÁN ĐÚNG (NẾU CHƠI TỰ LUẬN):</b>
            <input type="text" id="input-correct-short" placeholder="Gõ từ khóa chính xác..." style="margin-top: 5px;">

            <b style="color: #8e44ad; display:block; margin-top:15px;">BƯỚC 2: CÔNG BỐ KẾT QUẢ RA MÀN HÌNH CHÍNH:</b>
            <button style="background: #9b59b6; margin-top: 5px;" onclick="sendRevealCommand()">👁️ SHOW ĐÁP ÁN LÊN DISPLAY</button>
        </div>

        <h3>Thí sinh đang kết nối (<span id="player-count">0</span>)</h3>
        <div class="player-list" id="players-display"></div>
    </div>

    <script>
        const socket = io();
        let playersMap = {}; 
        let currentMode = 'MCQ'; 
        let countdownInterval = null;
        let currentMaxDuration = 15;
        let currentMaxScore = 100;
        let finalCorrectAnswer = '';
        let isQuizRunning = false;

        // Định kỳ gửi dữ liệu đồng bộ (Phòng trường hợp Admin thay đổi sửa điểm bằng tay)
        setInterval(() => {
            if (!isQuizRunning) {
                socket.emit('ADMIN_SYNC_PLAYERS', { players: playersMap });
            }
        }, 1000);

        function startQuiz() {
            clearInterval(countdownInterval);
            isQuizRunning = true;
            finalCorrectAnswer = '';
            document.getElementById('input-correct-short').value = '';

            currentMode = document.getElementById('input-quiz-type').value;
            const question = document.getElementById('input-question').value;
            currentMaxDuration = parseInt(document.getElementById('input-timer').value) || 15;
            currentMaxScore = parseFloat(document.getElementById('input-question-score').value) || 100;

            for (let p in playersMap) { 
                playersMap[p].answer = 'Chưa trả lời'; 
                playersMap[p].isLocked = false;
                playersMap[p].timeTaken = null;
                playersMap[p].calculatedScore = 0;
            }
            updateControllerUI();

            socket.emit('START_QUIZ', { 
                mode: currentMode, 
                question: question, 
                duration: currentMaxDuration 
            });

            let timeLeft = currentMaxDuration;
            document.getElementById('btn-start-quiz').disabled = true;
            document.getElementById('control-timer').innerText = `⏳ CÒN LẠI: ${timeLeft}s`;

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    endQuizSession();
                } else {
                    document.getElementById('control-timer').innerText = `⏳ CÒN LẠI: ${timeLeft}s`;
                }
            }, 1000);
        }

        function endQuizSession() {
            clearInterval(countdownInterval);
            isQuizRunning = false;
            document.getElementById('control-timer').innerText = "🛑 HẾT GIỜ - ĐÃ KHÓA ĐÁP ÁN!";
            document.getElementById('btn-start-quiz').disabled = false;
            socket.emit('TIME_UP', { duration: currentMaxDuration });
        }

        function selectMcqAnswer(key) {
            if(isQuizRunning) endQuizSession();
            finalCorrectAnswer = key;
            document.getElementById('control-timer').innerText = `🎯 Đã chọn đáp án đúng: [ ${key} ]`;
        }

        function sendRevealCommand() {
            if(isQuizRunning) endQuizSession();
            currentMode = document.getElementById('input-quiz-type').value;
            let finalAns = '';

            if (currentMode === 'MCQ') {
                if (!finalCorrectAnswer) { alert("Chưa chọn đáp án trắc nghiệm đúng!"); return; }
                finalAns = finalCorrectAnswer;
            } else {
                finalAns = document.getElementById('input-correct-short').value.trim();
                if (!finalAns) { alert("Chưa điền đáp án tự luận đúng!"); return; }
            }

            // Tính điểm cộng dồn cho thí sinh trả lời đúng và đã khóa đáp án
            for (let name in playersMap) {
                let p = playersMap[name];
                if (p.isEliminated) continue;

                let isRight = false;
                if (currentMode === 'MCQ') {
                    isRight = (p.answer === finalAns);
                } else {
                    isRight = (p.answer.toLowerCase().trim() === finalAns.toLowerCase().trim());
                }

                let currentPoints = isRight && p.isLocked ? parseFloat(p.calculatedScore || 0) : 0;
                let currentSecs = p.isLocked && p.timeTaken ? parseFloat(p.timeTaken) : 0;

                p.totalScore = (parseFloat(p.totalScore || 0) + currentPoints).toFixed(2);
                p.totalTime = (parseFloat(p.totalTime || 0) + currentSecs).toFixed(2);
            }

            socket.emit('COMMAND_DISPLAY_REVEAL', { correctAns: finalAns, mode: currentMode, players: playersMap });
            document.getElementById('control-timer').innerText = `🎉 ĐÃ SHOW ĐÁP ÁN [ ${finalAns} ]!`;
            updateControllerUI();
        }

        function updateScoreManual(name, val) {
            if (playersMap[name]) playersMap[name].totalScore = parseFloat(val || 0).toFixed(2);
        }

        function kickPlayer(name) {
            if (playersMap[name]) { playersMap[name].isEliminated = true; playersMap[name].answer = 'BỊ LOẠI'; updateControllerUI(); }
        }

        function revivePlayer(name) {
            if (playersMap[name]) { playersMap[name].isEliminated = false; playersMap[name].answer = 'Chưa trả lời'; updateControllerUI(); }
        }

        socket.on('SYNC_DATA_FROM_SERVER', (data) => {
            if (data.players) {
                // Nhận cập nhật từ các máy con gửi lên server trung gian
                for (let n in data.players) {
                    if (!playersMap[n]) {
                        playersMap[n] = data.players[n];
                    } else {
                        playersMap[n].answer = data.players[n].answer;
                        playersMap[n].isLocked = data.players[n].isLocked;
                        playersMap[n].timeTaken = data.players[n].timeTaken;
                        playersMap[n].calculatedScore = data.players[n].calculatedScore;
                        playersMap[n].isEliminated = data.players[n].isEliminated;
                    }
                }
                updateControllerUI();
            }
        });

        function updateControllerUI() {
            const listContainer = document.getElementById('players-display');
            listContainer.innerHTML = '';
            let count = 0;

            for (let name in playersMap) {
                count++;
                const p = playersMap[name];
                const item = document.createElement('div');
                item.className = `player-item ${p.isEliminated ? 'eliminated-row' : ''}`;
                
                let badgeStyle = p.isEliminated ? "background:#c0392b" : (p.answer !== 'Chưa trả lời' ? "background:#2ecc71" : "background:#7f8c8d");
                let statusIcon = p.isLocked ? `<span class="status-badge status-lock">🔒 Chốt</span>` : `<span class="status-badge status-typing">✍️ Sửa...</span>`;
                if (p.answer === 'Chưa trả lời' || p.isEliminated) statusIcon = '';

                let actionArea = p.isEliminated 
                    ? `<button class="btn-revive" onclick="revivePlayer('${name}')">❤️ Hồi sinh</button>` 
                    : `<button class="btn-kick" onclick="kickPlayer('${name}')">💥 Loại</button>`;

                item.innerHTML = `
                    <div class="player-info">
                        <span class="player-name-text">👤 ${name} ${statusIcon}</span>
                        ${!p.isEliminated && p.answer !== 'Chưa trả lời' ? `<span class="time-elapsed">⏱️ ${p.timeTaken}s | 🎯 Tạm tính: ${p.calculatedScore}đ</span>` : ''}
                        <span style="font-size:12px; color:#555;">Tổng Điểm: <input type="number" class="input-score-edit" value="${p.totalScore || 0}" oninput="updateScoreManual('${name}', this.value)">đ</span>
                    </div>
                    <div class="action-btns">
                        <span class="badge" style="${badgeStyle}">${p.answer}</span>
                        ${actionArea}
                    </div>`;
                listContainer.appendChild(item);
            }
            document.getElementById('player-count').innerText = count;
        }
    </script>
</body>
</html>
