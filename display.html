<!DOCTYPE html>
<html>
<head>
    <title>Player</title>
    <script>
        const channel = new BroadcastChannel('quiz_channel');
        let startTime = 0;

        channel.onmessage = (e) => {
            if(e.data.type === 'START') {
                startTime = e.data.timestamp;
                alert("Câu hỏi đã bắt đầu!");
            }
        };

        function submit() {
            let timeTaken = (Date.now() - startTime) / 1000;
            channel.postMessage({ type: 'SUBMIT', time: timeTaken });
        }
    </script>
</head>
<body>
    <button onclick="submit()">GỬI ĐÁP ÁN</button>
</body>
</html>
