<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện người chơi - Quiz Game</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 750px; text-align: center; }
        h1, h2 { color: #333; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; width: 100%; }
        .screen { display: none; }
        .active { display: block; }
        .question-box { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-size: 20px; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        @media(min-width: 500px) { .btn-group { grid-template-columns: 1fr 1fr; } }
        .btn-ans { font-size: 18px; font-weight: bold; padding: 18px; color: white; text-align: left; display: flex; align-items: center; border-radius: 8px;}
        .btn-ans span.prefix { font-size: 24px; margin-right: 15px; background: rgba(0,0,0,0.15); padding: 5px 12px; border-radius: 6px; }
        .btn-a { background: #e74c3c; } .btn-a:hover:not(:disabled) { background: #c0392b; }
        .btn-b { background: #3498db; } .btn-b:hover:not(:disabled) { background: #2980b9; }
        .btn-c { background: #2ecc71; } .btn-c:hover:not(:disabled) { background: #27ae60; }
        .btn-d { background: #f1c40f; } .btn-d:hover:not(:disabled) { background: #f39c12; }
        .btn-ans.selected { border: 4px solid #333; box-shadow: 0 0 15px rgba(0,0,0,0.3); transform: scale(1.01); }
        .text-input-mode { background: #fdfefe; padding: 20px; border: 2px dashed #34495e; border-radius: 8px; margin-top: 20px; }
        .text-input-mode input.locked { background-color: #e9ecef; color: #495057; border-color: #ced4da; cursor: pointer; font-weight: bold; }
        .submit-action-area { margin-top: 20px; padding: 10px; background: #fff3cd; border-radius: 8px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-screen" class="screen active">
            <h1>Chào mừng đến với Quiz Game</h1>
            <input type="text" id="player-name" placeholder="Nhập tên hiển thị của bạn..." onkeydown="if(event.key==='Enter') initPlayer()">
            <button onclick="initPlayer()" style="width: 100%;">Tham gia phòng</button>
        </div>

        <div id="player-screen" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <b id="player-title">Player</b>
                <span id="player-timer" style="font-size: 20px; font-weight: bold; color: #e74c3c;">00s</span>
            </div>
            <div class="question-box" id="display-question">Đang đợi câu hỏi từ Controller...</div>
            <p id="player-status" style="font-style: italic; color: #666; margin-bottom: 15px;">Hệ thống đang đóng. Vui lòng chờ...</p>
            
            <div id="player-mcq-box" class="btn-group">
                <button id="btn-ans-A" class="btn-ans btn-a" onclick="selectMCQAnswer('A')"><span class="prefix">A</span> <span id="text-ans-A">Đáp án A</span></button>
                <button id="btn-ans-B" class="btn-ans btn-b" onclick="selectMCQAnswer('B')"><span class="prefix">B</span> <span id="text-ans-B">Đáp án B</span></button>
                <button id="btn-ans-C" class="btn-ans btn-c" onclick="selectMCQAnswer('C')"><span class="prefix">C</span> <span id="text-ans-C">Đáp án C</span></button>
                <button id="btn-ans-D" class="btn-ans btn-d" onclick="selectMCQAnswer('D')"><span class="prefix">D</span> <span id="text-ans-D">Đáp án D</span></button>
            </div>

            <div id="player-text-box" class="text-input-mode" style="display: none;">
                <label style="font-weight: bold; display: block; margin-bottom: 10px; text-align: left;">Nhập câu trả lời của bạn:</label>
                <input type="text" id="player-text-input" placeholder="Gõ câu trả lời tại đây..." oninput="syncTextRealtime(this.value)" onmousedown="handleTextClickUnlock()">
            </div>

            <div id="player-action-area" class="submit-action-area" style="display: none;">
                <button id="btn-lock-answer" onclick="lockAnswerFinal()" style="background: #e67e22; font-weight: bold; width: 60%; padding: 10px;">🔒 CHỐT ĐÁP ÁN (Enter)</button>
                <button id="btn-unlock-answer" onclick="unlockAnswerToEdit()" style="background: #7f8c8d; font-weight: bold; width: 30%; padding: 10px; display: none;">✏️ Sửa lại</button>
                <p id="action-hint" style="font-size: 12px; color: #7f8c8d; margin: 5px 0 0 0;">* Nhấn Enter hoặc Click vào ô text để bật/tắt chốt nhanh.</p>
            </div>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('quiz_score_engine_channel');
        let myName = '';
        let currentMode = 'MCQ'; 
        let countdownInterval = null;
        let timeIsOverGlobal = false; 
        let currentMaxDuration = 15;
        let startTimeToken = 0; 
        let playerTempAnswer = ''; 
        let isAnswerLocked = false; 
        let savedTimeTaken = null; 

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && myName !== '') {
                if (timeIsOverGlobal) return; 
                if (document.getElementById('player-action-area').style.display === 'block') {
                    if (!isAnswerLocked) { lockAnswerFinal(); } 
                    else { unlockAnswerToEdit(); }
                }
            }
        });

        function handleTextClickUnlock() {
            if (timeIsOverGlobal) return;
            if (currentMode === 'SHORT_ANS' && isAnswerLocked) { unlockAnswerToEdit(); }
        }

        function initPlayer() {
            const inputName = document.getElementById('player-name').value.trim();
            if (!inputName) { return alert("Vui lòng nhập tên!"); }
            myName = inputName;
            document.getElementById('player-title').innerText = `👤 Player: ${myName}`;
            switchScreen('player-screen');
            enableMCQButtons(false);
            channel.postMessage({ type: 'PLAYER_JOIN', name: myName });
        }

        // Tự động phản hồi Ping giữ kết nối bất kể đang ở màn hình nào
        channel.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'CONTROLLER_PING' && myName !== '') {
                channel.postMessage({ type: 'PLAYER_JOIN', name: myName });
                return;
            }

            if (data.type === 'START_QUIZ') {
                currentMode = data.mode;
                startTimeToken = data.timestamp; // Mốc cố định Date.now() từ Controller
                currentMaxDuration = data.duration;
                timeIsOverGlobal = false;
                isAnswerLocked = false;
                playerTempAnswer = '';
                savedTimeTaken = null; 
                
                document.getElementById('player-action-area').style.display = 'block';
                document.getElementById('btn-lock-answer').style.display = 'inline-block';
                document.getElementById('btn-unlock-answer').style.display = 'none';
                document.getElementById('display-question').innerText = data.question;

                const txtInput = document.getElementById('player-text-input');
                txtInput.classList.remove('locked');
                txtInput.readOnly = false;

                if (currentMode === 'MCQ') {
                    document.getElementById('player-mcq-box').style.display = 'grid';
                    document.getElementById('player-text-box').style.display = 'none';
                    document.getElementById('text-ans-A').innerText = data.answers.A;
                    document.getElementById('text-ans-B').innerText = data.answers.B;
                    document.getElementById('text-ans-C').innerText = data.answers.C;
                    document.getElementById('text-ans-D').innerText = data.answers.D;
                    document.getElementById('player-status').innerText = "Hãy chọn phương án rồi nhấn CHỐT ĐÁP ÁN.";
                    resetMCQButtonStyles();
                    enableMCQButtons(true);
                } else {
                    document.getElementById('player-mcq-box').style.display = 'none';
                    document.getElementById('player-text-box').style.display = 'block';
                    txtInput.value = '';
                    txtInput.focus();
                    document.getElementById('player-status').innerText = "Hãy nhập câu trả lời rồi nhấn Enter để Chốt.";
                }
                startPlayerTimer(data.duration);
            } else if (data.type === 'TIME_UP') {
                forceLockOnTimeUp(data.duration);
            }
        };

        function selectMCQAnswer(ans) {
            if (isAnswerLocked) return;
            playerTempAnswer = ans;
            resetMCQButtonStyles();
            document.getElementById(`btn-ans-${ans}`).classList.add('selected');
            document.getElementById('player-status').innerText = `Bạn đang chọn phương án: ${ans}. Đừng quên bấm CHỐT!`;
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: ans, isLocked: false, timeTaken: null });
        }

        function syncTextRealtime(val) {
            if (isAnswerLocked) return;
            playerTempAnswer = val.trim();
            let sendVal = playerTempAnswer ? playerTempAnswer : "Chưa trả lời";
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: sendVal, isLocked: false, timeTaken: null });
        }

        function lockAnswerFinal() {
            if (currentMode === 'SHORT_ANS') {
                playerTempAnswer = document.getElementById('player-text-input').value.trim();
            }
            if (!playerTempAnswer) {
                alert("Vui lòng chọn hoặc nhập đáp án trước khi chốt!");
                return;
            }
            isAnswerLocked = true;
            
            // Tính toán thời gian dựa trên mốc Epoch mili-giây thực tế của hệ thống
            const endTimeToken = Date.now();
            const timeDiff = (endTimeToken - startTimeToken) / 1000; 
            savedTimeTaken = Math.max(0.01, Math.min(timeDiff, currentMaxDuration)).toFixed(2); 

            if (currentMode === 'MCQ') {
                enableMCQButtons(false);
                document.getElementById('btn-lock-answer').style.display = 'none';
                document.getElementById('btn-unlock-answer').style.display = 'inline-block';
            } else {
                const txtInput = document.getElementById('player-text-input');
                txtInput.readOnly = true;
                txtInput.classList.add('locked');
                txtInput.blur(); 
                document.getElementById('btn-lock-answer').style.display = 'none';
                document.getElementById('btn-unlock-answer').style.display = 'none';
            }

            document.getElementById('player-status').innerText = `🔒 Đã CHỐT ĐÁP ÁN (${savedTimeTaken}s)! Nhấn Enter hoặc Ô chữ để sửa.`;
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: playerTempAnswer, isLocked: true, timeTaken: savedTimeTaken });
        }

        function unlockAnswerToEdit() {
            if (timeIsOverGlobal) return;
            isAnswerLocked = false;

            if (currentMode === 'MCQ') {
                enableMCQButtons(true);
                document.getElementById('btn-lock-answer').style.display = 'inline-block';
                document.getElementById('btn-unlock-answer').style.display = 'none';
                document.getElementById('player-status').innerText = "Đã mở khóa. Chọn lại phương án rồi bấm Chốt.";
            } else {
                const txtInput = document.getElementById('player-text-input');
                txtInput.readOnly = false;
                txtInput.classList.remove('locked');
                txtInput.focus(); 
                document.getElementById('player-status').innerText = "Đã sửa... Nhấn tiếp Enter để lưu chốt lại.";
            }

            let sendVal = playerTempAnswer ? playerTempAnswer : "Chưa trả lời";
            // Gửi thông báo chuyển trạng thái "Đang sửa", không ghi đè thời gian cũ lên Tech khi chưa chốt mới
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: sendVal, isLocked: false, timeTaken: null });
        }

        function forceLockOnTimeUp(maxDuration) {
            if (timeIsOverGlobal) return;
            timeIsOverGlobal = true;
            clearInterval(countdownInterval);

            if (isAnswerLocked) {
                channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: playerTempAnswer ? playerTempAnswer : "Không trả lời", isLocked: true, timeTaken: savedTimeTaken });
                return; 
            }

            isAnswerLocked = true;
            enableMCQButtons(false);
            const txtInput = document.getElementById('player-text-input');
            txtInput.readOnly = true;
            txtInput.classList.add('locked');
            document.getElementById('player-action-area').style.display = 'none'; 
            
            let finalAns = playerTempAnswer ? playerTempAnswer : "Không trả lời (Quá giờ)";
            savedTimeTaken = parseFloat(maxDuration).toFixed(2); 

            document.getElementById('player-status').innerText = `🛑 HẾT GIỜ! Đáp án chốt cuối cùng là: ${finalAns}`;
            document.getElementById('player-timer').innerText = "00s";

            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: finalAns, isLocked: true, timeTaken: savedTimeTaken });
        }

        function startPlayerTimer(duration) {
            clearInterval(countdownInterval);
            let timeLeft = duration;
            document.getElementById('player-timer').innerText = `${timeLeft}s`;
            countdownInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('player-timer').innerText = "00s";
                } else {
                    document.getElementById('player-timer').innerText = `${timeLeft}s`;
                }
            }, 1000);
        }

        function enableMCQButtons(status) { document.querySelectorAll('.btn-ans').forEach(btn => btn.disabled = !status); }
        function resetMCQButtonStyles() { document.querySelectorAll('.btn-ans').forEach(btn => btn.classList.remove('selected')); }
    </script>
</body>
</html>
