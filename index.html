<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện người chơi - Quiz Game</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 750px; text-align: center; }
        h1, h2 { color: #333; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; width: 100%; }
        .screen { display: none; }
        .active { display: block; }
        .question-box { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; font-size: 20px; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        .btn-ans { font-size: 24px; font-weight: bold; padding: 25px; color: white; border-radius: 8px; border: none; cursor: pointer; }
        .btn-a { background-color: #e74c3c; } .btn-a:hover:not(:disabled) { background-color: #c0392b; }
        .btn-b { background-color: #3498db; } .btn-b:hover:not(:disabled) { background-color: #2980b9; }
        .btn-c { background-color: #4b0082; } .btn-c:hover:not(:disabled) { background-color: #36005d; } /* Nút C Tím */
        .btn-d { background-color: #f1c40f; } .btn-d:hover:not(:disabled) { background-color: #f39c12; }
        .btn-ans.selected { border: 4px solid #333; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        .eliminated-overlay { display: none; background: #e74c3c; padding: 20px; border-radius: 8px; color: white; font-size: 20px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-screen" class="screen active">
            <h1>Tham gia tranh tài Online</h1>
            <input type="text" id="player-name" placeholder="Nhập họ tên của bạn...">
            <button onclick="initPlayer()" style="width: 100%;">Vào phòng chơi</button>
        </div>

        <div id="player-screen" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <b id="player-title" style="font-size: 18px;">Player</b>
                <span id="player-timer" style="font-size: 24px; font-weight: bold; color: #e74c3c;">00s</span>
            </div>
            
            <div id="main-play-zone">
                <div class="question-box" id="display-question">Đang đợi câu hỏi từ hệ thống...</div>
                <div id="player-status" style="font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 20px;">Hệ thống đang đóng...</div>
                
                <div id="player-mcq-box" class="btn-group">
                    <button id="btn-ans-A" class="btn-ans btn-a" onclick="selectMCQAnswer('A')">A</button>
                    <button id="btn-ans-B" class="btn-ans btn-b" onclick="selectMCQAnswer('B')">B</button>
                    <button id="btn-ans-C" class="btn-ans btn-c" onclick="selectMCQAnswer('C')">C</button>
                    <button id="btn-ans-D" class="btn-ans btn-d" onclick="selectMCQAnswer('D')">D</button>
                </div>

                <div id="player-text-box" style="display: none; margin-top: 10px;">
                    <input type="text" id="player-text-input" placeholder="Gõ câu trả lời của bạn..." oninput="syncTextRealtime(this.value)">
                </div>

                <div id="player-action-area" style="margin-top: 20px; display: none;">
                    <button id="btn-lock-answer" onclick="lockAnswerFinal()" style="background: #e67e22; font-weight: bold; width: 100%;">🔒 BẤM ĐỂ CHỐT ĐÁP ÁN</button>
                </div>
            </div>

            <div class="eliminated-overlay" id="elim-msg">☠️ BẠN ĐÃ BỊ LOẠI KHỎI SÀN ĐẤU!</div>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = '';
        let currentMode = 'MCQ'; 
        let countdownInterval = null;
        let timeIsOverGlobal = false; 
        let currentMaxDuration = 15;
        let iamEliminated = false; 
        
        let startThinkingTime = 0; 
        let playerTempAnswer = ''; 
        let isAnswerLocked = false; 

        function initPlayer() {
            const inputName = document.getElementById('player-name').value.trim();
            if (!inputName) return alert("Vui lòng nhập tên!");
            myName = inputName;
            document.getElementById('player-title').innerText = `👤 Thí sinh: ${myName}`;
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('player-screen').classList.add('active');
            enableMCQButtons(false);
            socket.emit('PLAYER_JOIN', { name: myName });
        }

        socket.on('SYNC_DATA_FROM_SERVER', (data) => {
            if(data.players && data.players[myName]) {
                iamEliminated = data.players[myName].isEliminated;
                if(iamEliminated) {
                    document.getElementById('main-play-zone').style.display = 'none';
                    document.getElementById('elim-msg').style.display = 'block';
                    clearInterval(countdownInterval);
                }
            }
        });

        socket.on('START_QUIZ', (data) => {
            if (iamEliminated) return;
            currentMode = data.mode;
            currentMaxDuration = data.duration;
            timeIsOverGlobal = false;
            isAnswerLocked = false;
            playerTempAnswer = '';
            startThinkingTime = Date.now();

            document.getElementById('player-action-area').style.display = 'block';
            document.getElementById('display-question').innerText = data.question;
            resetMCQButtonStyles();

            if (currentMode === 'MCQ') {
                document.getElementById('player-mcq-box').style.display = 'grid';
                document.getElementById('player-text-box').style.display = 'none';
                document.getElementById('player-status').innerText = "Vui lòng chọn đáp án và bấm CHỐT!";
                enableMCQButtons(true);
            } else {
                document.getElementById('player-mcq-box').style.display = 'none';
                document.getElementById('player-text-box').style.display = 'block';
                document.getElementById('player-text-input').value = '';
                document.getElementById('player-text-input').disabled = false;
                document.getElementById('player-status').innerText = "Gõ câu trả lời rồi bấm CHỐT!";
            }
            startPlayerTimer(data.duration);
        });

        socket.on('TIME_UP', (data) => {
            forceLockOnTimeUp(data.duration);
        });

        socket.on('COMMAND_DISPLAY_REVEAL', (data) => {
            document.getElementById('player-action-area').style.display = 'none';
            document.getElementById('player-status').innerText = `Đáp án đúng câu này là: ${data.correctAns}`;
        });

        function selectMCQAnswer(ans) {
            if (isAnswerLocked || timeIsOverGlobal) return;
            playerTempAnswer = ans;
            resetMCQButtonStyles();
            document.getElementById(`btn-ans-${ans}`).classList.add('selected');
            socket.emit('PLAYER_SUBMIT', { name: myName, answer: ans, isLocked: false, timeTaken: null });
        }

        function syncTextRealtime(val) {
            if (isAnswerLocked || timeIsOverGlobal) return;
            playerTempAnswer = val.trim();
            socket.emit('PLAYER_SUBMIT', { name: myName, answer: playerTempAnswer || 'Chưa trả lời', isLocked: false, timeTaken: null });
        }

        function lockAnswerFinal() {
            if(isAnswerLocked || timeIsOverGlobal) return;
            if (currentMode === 'SHORT_ANS') {
                playerTempAnswer = document.getElementById('player-text-input').value.trim();
            }
            if (!playerTempAnswer) return alert("Bạn chưa chọn hoặc điền câu trả lời!");

            isAnswerLocked = true;
            enableMCQButtons(false);
            document.getElementById('player-text-input').disabled = true;
            document.getElementById('player-action-area').style.display = 'none';

            let diffSeconds = ((Date.now() - startThinkingTime) / 1000).toFixed(2);
            let score = Math.max(10, 100 - parseFloat(diffSeconds) * 2).toFixed(2); // Thuật toán tính điểm nhanh chậm

            document.getElementById('player-status').innerText = `🔒 Đã chốt phương án thành công lúc ${diffSeconds}s!`;
            socket.emit('PLAYER_SUBMIT', { name: myName, answer: playerTempAnswer, isLocked: true, timeTaken: diffSeconds, calculatedScore: score });
        }

        function forceLockOnTimeUp(maxDuration) {
            if (timeIsOverGlobal) return;
            timeIsOverGlobal = true;
            clearInterval(countdownInterval);
            enableMCQButtons(false);
            document.getElementById('player-text-input').disabled = true;
            document.getElementById('player-action-area').style.display = 'none';
            document.getElementById('player-timer').innerText = "00s";

            if (isAnswerLocked) return;
            isAnswerLocked = true;
            let finalAns = playerTempAnswer ? playerTempAnswer : "Không trả lời";
            document.getElementById('player-status').innerText = `🛑 HẾT GIỜ! Hệ thống chốt tự động: ${finalAns}`;
            socket.emit('PLAYER_SUBMIT', { name: myName, answer: finalAns, isLocked: true, timeTaken: parseFloat(maxDuration).toFixed(2), calculatedScore: 0 });
        }

        function startPlayerTimer(duration) {
            clearInterval(countdownInterval);
            let timeLeft = duration;
            document.getElementById('player-timer').innerText = `${timeLeft}s`;
            countdownInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('player-timer').innerText = "00s";
                } else {
                    document.getElementById('player-timer').innerText = `${timeLeft}s`;
                }
            }, 1000);
        }

        function enableMCQButtons(status) { document.querySelectorAll('.btn-ans').forEach(btn => btn.disabled = !status); }
        function resetMCQButtonStyles() { 
            document.getElementById('btn-ans-A').style.backgroundColor = '#e74c3c';
            document.getElementById('btn-ans-B').style.backgroundColor = '#3498db';
            document.getElementById('btn-ans-C').style.backgroundColor = '#4b0082'; // Trả về màu tím mặc định khi reset câu hỏi
            document.getElementById('btn-ans-D').style.backgroundColor = '#f1c40f';
            document.querySelectorAll('.btn-ans').forEach(btn => btn.classList.remove('selected')); 
        }
    </script>
</body>
</html>
