<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện người chơi - Quiz Game</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 750px; text-align: center; }
        h1, h2 { color: #333; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; width: 100%; }
        .screen { display: none; }
        .active { display: block; }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 10px; }
        
        .btn-ans { font-size: 28px; font-weight: bold; padding: 30px; color: white; text-align: center; justify-content: center; display: flex; align-items: center; border-radius: 12px; transition: transform 0.2s; border: none;}
        .btn-a { background-color: #e74c3c; } .btn-a:hover:not(:disabled) { background-color: #c0392b; }
        .btn-b { background-color: #3498db; } .btn-b:hover:not(:disabled) { background-color: #2980b9; }
        .btn-c { background-color: #2ecc71; } .btn-c:hover:not(:disabled) { background-color: #27ae60; }
        .btn-d { background-color: #f1c40f; } .btn-d:hover:not(:disabled) { background-color: #f39c12; }
        .btn-ans.selected { border: 5px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.4); transform: scale(1.03); }
        .btn-ans.fade-out { opacity: 0.15; transform: scale(0.92); }

        .eliminated-overlay { display: none; background: #95a5a6; padding: 30px; border-radius: 8px; color: white; font-size: 22px; font-weight: bold; margin-top: 20px; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
        .text-input-mode { background: #fdfefe; padding: 25px; border: 2px dashed #34495e; border-radius: 8px; margin-top: 10px; }
        .text-input-mode input.locked { background-color: #e9ecef; color: #495057; border-color: #ced4da; cursor: pointer; font-weight: bold; text-align: center; font-size: 22px;}
        .submit-action-area { margin-top: 20px; padding: 10px; background: #fff3cd; border-radius: 8px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-screen" class="screen active">
            <h1>Chào mừng đến với Quiz Game</h1>
            <input type="text" id="player-name" placeholder="Nhập tên hiển thị của bạn..." onkeydown="if(event.key==='Enter') initPlayer()">
            <button onclick="initPlayer()" style="width: 100%;">Tham gia phòng</button>
        </div>

        <div id="player-screen" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <b id="player-title" style="font-size: 18px;">Player</b>
                <span id="player-timer" style="font-size: 24px; font-weight: bold; color: #e74c3c;">00s</span>
            </div>
            
            <div id="main-play-zone">
                <p id="player-status" style="font-size: 16px; font-weight: 500; color: #2c3e50; margin-bottom: 20px; background:#e8f4f8; padding:10px; border-radius:6px;">Hệ thống đang đóng. Vui lòng chờ lệnh...</p>
                
                <div id="player-mcq-box" class="btn-group">
                    <button id="btn-ans-A" class="btn-ans btn-a" onclick="selectMCQAnswer('A')">A</button>
                    <button id="btn-ans-B" class="btn-ans btn-b" onclick="selectMCQAnswer('B')">B</button>
                    <button id="btn-ans-C" class="btn-ans btn-c" onclick="selectMCQAnswer('C')">C</button>
                    <button id="btn-ans-D" class="btn-ans btn-d" onclick="selectMCQAnswer('D')">D</button>
                </div>

                <div id="player-text-box" class="text-input-mode" style="display: none;">
                    <label style="font-weight: bold; display: block; margin-bottom: 12px; text-align: left; font-size:16px;">Nhập câu trả lời của bạn:</label>
                    <input type="text" id="player-text-input" placeholder="Gõ câu trả lời tại đây..." oninput="syncTextRealtime(this.value)" onmousedown="handleTextClickUnlock()">
                </div>

                <div id="player-action-area" class="submit-action-area" style="display: none;">
                    <button id="btn-lock-answer" onclick="lockAnswerFinal()" style="background: #e67e22; font-weight: bold; width: 60%; padding: 12px; font-size:16px;">🔒 CHỐT ĐÁP ÁN (Enter)</button>
                    <button id="btn-unlock-answer" onclick="unlockAnswerToEdit()" style="background: #7f8c8d; font-weight: bold; width: 30%; padding: 12px; display: none; font-size:16px;">✏️ Sửa</button>
                </div>
            </div>

            <div class="eliminated-overlay" id="elim-msg">
                ☠️ BẠN ĐÃ BỊ LOẠI KHỎI SÀN ĐẤU!<br>
                <span style="font-size:14px; font-weight:normal; margin-top:5px; display:block; color:#eee;">Hãy theo dõi tiếp màn hình máy chiếu lớn nhé.</span>
            </div>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('quiz_score_engine_channel');
        let myName = '';
        let currentMode = 'MCQ'; 
        let countdownInterval = null;
        let timeIsOverGlobal = false; 
        let currentMaxDuration = 15;
        let iamEliminated = false; 
        
        let startThinkingTime = 0; 
        let totalTimeAccumulated = 0; 
        let playerTempAnswer = ''; 
        let isAnswerLocked = false; 
        let savedTimeTaken = null; 

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && myName !== '' && !iamEliminated) {
                if (timeIsOverGlobal) return; 
                if (document.getElementById('player-action-area').style.display === 'block') {
                    if (!isAnswerLocked) { lockAnswerFinal(); } 
                    else { unlockAnswerToEdit(); }
                }
            }
        });

        function handleTextClickUnlock() {
            if (timeIsOverGlobal || iamEliminated) return;
            if (currentMode === 'SHORT_ANS' && isAnswerLocked) { unlockAnswerToEdit(); }
        }

        function initPlayer() {
            const inputName = document.getElementById('player-name').value.trim();
            if (!inputName) { return alert("Vui lòng nhập tên!"); }
            myName = inputName;
            document.getElementById('player-title').innerText = `👤 Thí sinh: ${myName}`;
            switchScreen('player-screen');
            enableMCQButtons(false);
            channel.postMessage({ type: 'PLAYER_JOIN', name: myName });
        }

        channel.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'CONTROLLER_PING' && myName !== '') {
                channel.postMessage({ type: 'PLAYER_JOIN', name: myName });
                return;
            }

            if (data.type === 'SYNC_DISPLAY_DATA') {
                if(data.players && data.players[myName]) {
                    let remoteState = data.players[myName].isEliminated;
                    if (remoteState !== iamEliminated) {
                        iamEliminated = remoteState;
                        if(iamEliminated) {
                            document.getElementById('main-play-zone').style.display = 'none';
                            document.getElementById('elim-msg').style.display = 'block';
                            clearInterval(countdownInterval);
                            document.getElementById('player-timer').innerText = "00s";
                        } else {
                            document.getElementById('main-play-zone').style.display = 'block';
                            document.getElementById('elim-msg').style.display = 'none';
                            document.getElementById('player-status').innerText = "❤️ Bạn đã được cứu! Hãy sẵn sàng.";
                        }
                    }
                }
                return;
            }

            if (iamEliminated) return;

            // Nhận lệnh khởi tạo và tính giờ từ Admin
            if (data.type === 'START_QUIZ') {
                currentMode = data.mode;
                currentMaxDuration = data.duration;
                timeIsOverGlobal = false;
                isAnswerLocked = false;
                playerTempAnswer = '';
                savedTimeTaken = null; 
                
                startThinkingTime = Date.now(); 
                totalTimeAccumulated = 0; 

                document.getElementById('player-action-area').style.display = 'block';
                document.getElementById('btn-lock-answer').style.display = 'inline-block';
                document.getElementById('btn-unlock-answer').style.display = 'none';

                const txtInput = document.getElementById('player-text-input');
                txtInput.classList.remove('locked');
                txtInput.readOnly = false;

                resetMCQButtonStyles();

                if (currentMode === 'MCQ') {
                    document.getElementById('player-mcq-box').style.display = 'grid';
                    document.getElementById('player-text-box').style.display = 'none';
                    document.getElementById('player-status').innerText = "Nhìn màn hình chính, chọn đáp án rồi bấm CHỐT!";
                    enableMCQButtons(true);
                } else {
                    document.getElementById('player-mcq-box').style.display = 'none';
                    document.getElementById('player-text-box').style.display = 'block';
                    txtInput.value = '';
                    txtInput.focus();
                    document.getElementById('player-status').innerText = "Gõ câu trả lời rồi nhấn Enter để Chốt.";
                }
                
                // Khởi chạy đồng hồ tính giờ phía người chơi
                startPlayerTimer(data.duration);

            } else if (data.type === 'TIME_UP') {
                forceLockOnTimeUp(data.duration);
            }
        };

        function selectMCQAnswer(ans) {
            if (isAnswerLocked || iamEliminated) return;
            playerTempAnswer = ans;
            resetMCQButtonStyles();
            document.getElementById(`btn-ans-${ans}`).classList.add('selected');
            document.getElementById('player-status').innerText = `Đang chọn: ${ans}. Đừng quên bấm CHỐT!`;
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: ans, isLocked: false, timeTaken: null });
        }

        function syncTextRealtime(val) {
            if (isAnswerLocked || iamEliminated) return;
            playerTempAnswer = val.trim();
            let sendVal = playerTempAnswer ? playerTempAnswer : "Chưa trả lời";
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: sendVal, isLocked: false, timeTaken: null });
        }

        function lockAnswerFinal() {
            if(iamEliminated) return;
            if (currentMode === 'SHORT_ANS') {
                playerTempAnswer = document.getElementById('player-text-input').value.trim();
            }
            if (!playerTempAnswer) {
                alert("Vui lòng chọn hoặc nhập đáp án trước khi chốt!");
                return;
            }
            isAnswerLocked = true;
            
            const sessionDuration = (Date.now() - startThinkingTime) / 1000;
            totalTimeAccumulated += sessionDuration;
            savedTimeTaken = Math.max(0.01, Math.min(totalTimeAccumulated, currentMaxDuration)).toFixed(2); 

            if (currentMode === 'MCQ') {
                enableMCQButtons(false);
                document.getElementById('btn-lock-answer').style.display = 'none';
                document.getElementById('btn-unlock-answer').style.display = 'inline-block';
            } else {
                const txtInput = document.getElementById('player-text-input');
                txtInput.readOnly = true;
                txtInput.classList.add('locked');
                txtInput.blur(); 
                document.getElementById('btn-lock-answer').style.display = 'none';
                document.getElementById('btn-unlock-answer').style.display = 'none';
            }

            document.getElementById('player-status').innerText = `🔒 Đã CHỐT ĐÁP ÁN (${savedTimeTaken}s)!`;
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: playerTempAnswer, isLocked: true, timeTaken: savedTimeTaken });
        }

        function unlockAnswerToEdit() {
            if (timeIsOverGlobal || iamEliminated) return;
            isAnswerLocked = false;
            startThinkingTime = Date.now(); 

            if (currentMode === 'MCQ') {
                enableMCQButtons(true);
                document.getElementById('btn-lock-answer').style.display = 'inline-block';
                document.getElementById('btn-unlock-answer').style.display = 'none';
                document.getElementById('player-status').innerText = "Đã mở khóa. Chọn lại phương án rồi bấm Chốt.";
            } else {
                const txtInput = document.getElementById('player-text-input');
                txtInput.readOnly = false;
                txtInput.classList.remove('locked');
                txtInput.focus(); 
                document.getElementById('player-status').innerText = "Đã sửa... Nhấn tiếp Enter để lưu chốt.";
            }

            let sendVal = playerTempAnswer ? playerTempAnswer : "Chưa trả lời";
            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: sendVal, isLocked: false, timeTaken: null });
        }

        function forceLockOnTimeUp(maxDuration) {
            if (timeIsOverGlobal || iamEliminated) return;
            timeIsOverGlobal = true;
            clearInterval(countdownInterval);

            if (isAnswerLocked) {
                channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: playerTempAnswer ? playerTempAnswer : "Không trả lời", isLocked: true, timeTaken: savedTimeTaken });
                return; 
            }

            isAnswerLocked = true;
            enableMCQButtons(false);
            const txtInput = document.getElementById('player-text-input');
            txtInput.readOnly = true;
            txtInput.classList.add('locked');
            document.getElementById('player-action-area').style.display = 'none'; 
            
            const sessionDuration = (Date.now() - startThinkingTime) / 1000;
            totalTimeAccumulated += sessionDuration;
            savedTimeTaken = parseFloat(maxDuration).toFixed(2); 

            let finalAns = playerTempAnswer ? playerTempAnswer : "Không trả lời";
            document.getElementById('player-status').innerText = `🛑 HẾT GIỜ! Bạn chọn: ${finalAns}.`;
            document.getElementById('player-timer').innerText = "00s";

            channel.postMessage({ type: 'PLAYER_SUBMIT', name: myName, answer: finalAns, isLocked: true, timeTaken: savedTimeTaken });
        }

        function startPlayerTimer(duration) {
            clearInterval(countdownInterval);
            let timeLeft = duration;
            document.getElementById('player-timer').innerText = `${timeLeft}s`;
            countdownInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('player-timer').innerText = "00s";
                } else {
                    document.getElementById('player-timer').innerText = `${timeLeft}s`;
                }
            }, 1000);
        }

        function enableMCQButtons(status) { document.querySelectorAll('.btn-ans').forEach(btn => btn.disabled = !status); }
        function resetMCQButtonStyles() { document.querySelectorAll('.btn-ans').forEach(btn => btn.classList.remove('selected')); }
    </script>
</body>
</html>
